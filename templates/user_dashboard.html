<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmDesk — Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #eee8d8; --bg2: #e5deca; --surface: #faf6ec; --surface2: #f3edd9;
  --border: #d4c9a8; --ink: #1a1f0d; --ink-mid: #3d4828; --ink-muted: #7a7d5e;
  --olive: #4a5e20; --olive-lt: #6b8530; --olive-glow: rgba(74,94,32,0.15);
  --amber: #b85c0a; --amber-lt: #e07820; --tag: #deeaba;
  --shadow: 0 8px 32px rgba(30,40,10,0.13);
}
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg2); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 20% 30%, rgba(107,133,48,0.07) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(184,92,10,0.05) 0%, transparent 50%); pointer-events: none; z-index: 0; }
header { position: sticky; top: 0; z-index: 100; background: var(--olive); padding: 0 40px; height: 68px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--olive-lt), var(--amber-lt), transparent); }
.brand { display: flex; align-items: center; gap: 12px; color: #fff; text-decoration: none; }
.brand-pill { background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 6px 10px; font-size: 20px; line-height: 1; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; letter-spacing: 0.2px; }
.brand-tagline { font-size: 0.65rem; opacity: 0.55; letter-spacing: 2px; text-transform: uppercase; display: block; margin-top: -2px; font-weight: 300; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.cart-trigger { position: relative; display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 500; transition: background 0.2s; }
.cart-trigger:hover { background: rgba(255,255,255,0.18); }
.cart-count { position: absolute; top: -6px; right: -6px; background: var(--amber-lt); color: #fff; font-size: 0.65rem; font-weight: 600; width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center; font-family: 'DM Mono', monospace; opacity: 0; transform: scale(0.5); transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
.cart-count.show { opacity: 1; transform: scale(1); }
.logout-link { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.8rem; padding: 7px 13px; border: 1px solid rgba(255,255,255,0.2); border-radius: 7px; transition: all 0.2s; }
.logout-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
.page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 28px 80px; }
.page-heading { margin-bottom: 32px; }
.page-heading h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--olive); font-weight: 600; line-height: 1.2; }
.page-heading p { color: var(--ink-muted); font-size: 0.88rem; margin-top: 6px; font-weight: 300; }
.med-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
.med-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px 20px; display: flex; flex-direction: column; gap: 14px; position: relative; overflow: hidden; transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.2s; animation: cardIn 0.4s ease both; }
@keyframes cardIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
.med-card:nth-child(1){animation-delay:.04s} .med-card:nth-child(2){animation-delay:.08s} .med-card:nth-child(3){animation-delay:.12s} .med-card:nth-child(4){animation-delay:.16s} .med-card:nth-child(5){animation-delay:.20s} .med-card:nth-child(6){animation-delay:.24s} .med-card:nth-child(7){animation-delay:.28s} .med-card:nth-child(8){animation-delay:.32s}
.med-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--olive-lt), var(--amber-lt)); opacity: 0; transition: opacity 0.25s; }
.med-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: #bfb48a; }
.med-card:hover::before { opacity: 1; }
.med-icon { width: 44px; height: 44px; background: var(--tag); border-radius: 12px; display: grid; place-items: center; font-size: 22px; }
.med-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--ink-mid); line-height: 1.3; font-style: italic; flex: 1; }
.med-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: auto; }
.med-price { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--olive); letter-spacing: -0.3px; }
.med-price span { font-size: 0.72rem; color: var(--ink-muted); font-weight: 400; letter-spacing: 0; margin-right: 1px; }
.add-btn { display: flex; align-items: center; gap: 5px; background: var(--olive); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; letter-spacing: 0.2px; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; flex-shrink: 0; }
.add-btn:hover { background: #374815; box-shadow: 0 4px 12px var(--olive-glow); }
.add-btn:active { transform: scale(0.95); }
.add-btn.added { background: #2d6a2d; animation: pulse 0.3s ease; }
@keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }

/* CART DRAWER */
.overlay { position: fixed; inset: 0; background: rgba(20,25,10,0.4); backdrop-filter: blur(3px); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.overlay.open { opacity: 1; pointer-events: all; }
.drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 360px; background: var(--surface); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -8px 0 40px rgba(0,0,0,0.18); }
.drawer.open { transform: translateX(0); }
.drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, #f5f0e0, var(--surface)); }
.drawer-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--olive); }
.close-btn { width: 32px; height: 32px; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; display: grid; place-items: center; font-size: 16px; transition: background 0.15s; color: var(--ink-mid); }
.close-btn:hover { background: var(--border); }
.drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.cart-empty { text-align: center; color: var(--ink-muted); font-size: 0.87rem; padding: 60px 0; }
.cart-empty-icon { font-size: 40px; margin-bottom: 12px; }
.cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #ede7d2; animation: slideIn 0.25s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
.cart-item-name { flex: 1; font-size: 0.88rem; font-weight: 500; color: var(--ink-mid); line-height: 1.3; }
.cart-item-qty { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--ink-muted); background: var(--tag); padding: 2px 7px; border-radius: 12px; }
.cart-item-price { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--olive); font-weight: 500; min-width: 60px; text-align: right; }
.drawer-footer { padding: 20px 24px; border-top: 1px solid var(--border); background: var(--surface2); }
.total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
.total-label { font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-muted); font-family: 'DM Mono', monospace; }
.total-amount { font-family: 'DM Mono', monospace; font-size: 1.4rem; font-weight: 500; color: var(--olive); }
.checkout-btn { width: 100%; padding: 13px; background: var(--olive); color: #fff; border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; transition: background 0.2s, box-shadow 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.checkout-btn:hover { background: #374815; box-shadow: 0 4px 18px var(--olive-glow); }
.checkout-btn:active { transform: scale(0.98); }

/* ── CHECKOUT MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(20,25,10,0.55); backdrop-filter: blur(4px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: 20px; width: 100%; max-width: 480px; box-shadow: 0 28px 80px rgba(20,25,10,0.3); transform: scale(0.93) translateY(18px); opacity: 0; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
.modal-overlay.open .modal { transform: scale(1) translateY(0); opacity: 1; }
.modal-head { background: var(--olive); padding: 24px 28px 20px; position: relative; overflow: hidden; flex-shrink: 0; }
.modal-head::before { content: ''; position: absolute; width: 180px; height: 180px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.07); bottom: -70px; right: -50px; }
.modal-eyebrow { font-size: 0.63rem; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.5); font-family: 'DM Mono', monospace; margin-bottom: 5px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #fff; line-height: 1.15; }
.modal-body { padding: 24px 28px; overflow-y: auto; flex: 1; }
.modal-section { font-size: 0.67rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--olive-lt); font-family: 'DM Mono', monospace; margin-bottom: 12px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
.order-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--border); font-size: 0.87rem; color: var(--ink-mid); }
.order-row:last-child { border-bottom: none; }
.order-row-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.92rem; }
.order-row-price { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--olive); }
.order-total-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0 20px; padding-top: 10px; border-top: 2px solid var(--border); }
.order-total-lbl { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-muted); font-family: 'DM Mono', monospace; }
.order-total-val { font-family: 'DM Mono', monospace; font-size: 1.35rem; font-weight: 500; color: var(--olive); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 0.67rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
.field input, .field textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface2); font-family: 'Outfit', sans-serif; font-size: 0.92rem; color: var(--ink); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.field textarea { resize: vertical; min-height: 76px; }
.field input:focus, .field textarea:focus { border-color: var(--olive-lt); box-shadow: 0 0 0 3px var(--olive-glow); background: #fffdf6; }
.cod-badge { display: flex; align-items: center; gap: 8px; background: var(--tag); border-radius: 9px; padding: 10px 14px; margin-bottom: 18px; font-size: 0.82rem; color: var(--olive); font-weight: 500; }
.modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.btn-cancel { flex: 1; padding: 12px; background: none; color: var(--ink-muted); border: 1.5px solid var(--border); border-radius: 9px; font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
.btn-cancel:hover { background: var(--bg2); }
.btn-place { flex: 2; padding: 12px; background: var(--olive); color: #fff; border: none; border-radius: 9px; font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: background 0.2s, box-shadow 0.2s, transform 0.1s; }
.btn-place:hover { background: #374815; box-shadow: 0 4px 16px var(--olive-glow); }
.btn-place:active { transform: scale(0.98); }
.success-wrap { padding: 40px 28px; text-align: center; }
.success-icon { font-size: 3rem; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); margin-bottom: 14px; }
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
.success-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--olive); margin-bottom: 8px; }
.success-sub { font-size: 0.86rem; color: var(--ink-muted); font-weight: 300; line-height: 1.6; margin-bottom: 20px; }
.success-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; text-align: left; font-size: 0.84rem; color: var(--ink-mid); line-height: 1.9; margin-bottom: 22px; }
.success-card strong { color: var(--olive); }
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink-mid); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 0.83rem; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 400; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.shake { animation: shake 0.35s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@media (max-width: 600px) { header{padding:0 18px} .page{padding:28px 16px 60px} .drawer{width:100%} .page-heading h1{font-size:1.5rem} .modal-body{padding:18px 20px} .modal-head{padding:20px 20px 16px} }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-pill">💊</div>
    <div>
      <span class="brand-name">PharmDesk</span>
      <span class="brand-tagline">Patient Store</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="cart-trigger" onclick="toggleDrawer()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      Cart
      <span class="cart-count" id="cartCount">0</span>
    </button>
    <a href="/logout" class="logout-link">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </a>
  </div>
</header>

<div class="page">
  <div class="page-heading">
    <h1>Available Medicines</h1>
    <p>Browse and add medicines to your cart</p>
  </div>

  <div class="med-grid">
    {% for m in meds %}
    <div class="med-card">
      <div class="med-icon">💊</div>
      <div class="med-name">{{ m[1] }}</div>
      <div class="med-footer">
        <div class="med-price"><span>₱</span>{{ m[3] }}</div>
        <button class="add-btn" id="btn-{{ m[1] }}" onclick="addToCart('{{ m[1] }}', {{ m[3] }}, {{ m[2] }}, this)">
          + Add
        </button>
      </div>
      <div style="font-size:0.7rem;color:var(--ink-muted);margin-top:5px;font-family:'DM Mono',monospace;">
        Stock: <span id="stock-{{ m[1] }}">{{ m[2] }}</span>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<!-- CART OVERLAY + DRAWER -->
<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">🛒 Your Cart</span>
    <button class="close-btn" onclick="toggleDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody">
    <div class="cart-empty" id="emptyMsg">
      <div class="cart-empty-icon">🛒</div>
      <div>Your cart is empty</div>
      <div style="font-size:0.78rem;margin-top:4px;opacity:0.7">Add medicines to get started</div>
    </div>
  </div>
  <div class="drawer-footer">
    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-amount" id="totalAmount">₱0.00</span>
    </div>
    <button class="checkout-btn" onclick="openCheckoutModal()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      Proceed to Checkout
    </button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkoutModalOverlay">
  <div class="modal" id="checkoutModalBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const cartItems = {};

function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function addToCart(name, price, maxStock, btn) {
  const inCart = cartItems[name] ? cartItems[name].qty : 0;
  if (inCart >= maxStock) { showToast('⚠️ Out of stock!'); return; }

  fetch("/add_to_cart", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, price })
  })
  .then(res => res.json())
  .then(() => {
    if (cartItems[name]) { cartItems[name].qty += 1; }
    else { cartItems[name] = { price, qty: 1 }; }
    updateDrawer();
    showToast('✅ ' + name + ' added');
    btn.classList.add('added');
    btn.textContent = '✓ Added';
    setTimeout(() => {
      btn.classList.remove('added');
      btn.textContent = (cartItems[name] && cartItems[name].qty >= maxStock) ? 'Full' : '+ Add';
    }, 1000);
  });
}

function removeFromCart(name) {
  delete cartItems[name];
  updateDrawer();
  showToast('🗑️ Item removed');

  // Sync sa server
  fetch("/remove_from_cart", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name })
  }).catch(() => showToast('⚠️ Sync failed'));
}

function updateDrawer() {
  const body = document.getElementById('drawerBody');
  const countEl = document.getElementById('cartCount');
  const totalEl = document.getElementById('totalAmount');
  const names = Object.keys(cartItems);
  let total = 0, count = 0;
  body.innerHTML = '';
  if (names.length === 0) {
    body.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div>Your cart is empty</div></div>`;
    countEl.classList.remove('show');
    totalEl.textContent = '₱0.00';
    syncStockDisplay(); return;
  }
  names.forEach(name => {
    const { price, qty } = cartItems[name];
    total += price * qty; count += qty;
    const row = document.createElement('div');
    row.className = 'cart-item';
    row.innerHTML = `
      <div class="cart-item-name">${name}</div>
      <span class="cart-item-qty">×${qty}</span>
      <div class="cart-item-price">₱${(price * qty).toFixed(2)}</div>
      <button class="close-btn" style="width:24px;height:24px;font-size:10px;margin-left:10px;"
              onclick="removeFromCart('${name}')">✕</button>
    `;
    body.appendChild(row);
  });
  countEl.textContent = count;
  countEl.classList.add('show');
  totalEl.textContent = '₱' + total.toFixed(2);
  syncStockDisplay();
}

function syncStockDisplay() {
  document.querySelectorAll('.med-card').forEach(card => {
    const name = card.querySelector('.med-name').textContent.trim();
    const stockSpan = document.getElementById('stock-' + name);
    const btn = document.getElementById('btn-' + name);
    if (!stockSpan || !btn) return;
    const orig = parseInt(stockSpan.getAttribute('data-original') || stockSpan.textContent);
    if (!stockSpan.getAttribute('data-original')) stockSpan.setAttribute('data-original', orig);
    const inCart = cartItems[name] ? cartItems[name].qty : 0;
    const remaining = orig - inCart;
    stockSpan.textContent = remaining;
    btn.disabled = remaining <= 0;
    if (remaining <= 0) btn.textContent = 'Full';
  });
}

// ── CHECKOUT MODAL ──
function openCheckoutModal() {
  if (Object.keys(cartItems).length === 0) { showToast('🛒 Cart is empty!'); return; }
  toggleDrawer();

  const total = Object.values(cartItems).reduce((s, i) => s + i.price * i.qty, 0);
  const box = document.getElementById('checkoutModalBox');

  box.innerHTML = `
    <div class="modal-head">
      <div class="modal-eyebrow">Confirm Your Order</div>
      <div class="modal-title">Review &amp; Checkout</div>
    </div>
    <div class="modal-body">
      <div class="modal-section">Order Summary</div>
      <div>
        ${Object.entries(cartItems).map(([name, {price, qty}]) => `
          <div class="order-row">
            <span class="order-row-name">${name} × ${qty}</span>
            <span class="order-row-price">₱${(price * qty).toFixed(2)}</span>
          </div>
        `).join('')}
      </div>
      <div class="order-total-row">
        <span class="order-total-lbl">Total Amount</span>
        <span class="order-total-val">₱${total.toFixed(2)}</span>
      </div>

      <div class="modal-section" style="margin-top:4px;">Delivery Details</div>
      <div class="cod-badge">
        💵 Payment method: <strong>Cash on Delivery</strong>
      </div>
      <div class="field">
        <label for="coName">Full Name</label>
        <input id="coName" type="text" placeholder="e.g. Juan Dela Cruz" autocomplete="name">
      </div>
      <div class="field">
        <label for="coPhone">Contact Number</label>
        <input id="coPhone" type="tel" placeholder="e.g. 09XX XXX XXXX" autocomplete="tel">
      </div>
      <div class="field">
        <label for="coAddress">Delivery Address</label>
        <textarea id="coAddress" rows="3" placeholder="House No., Street, Barangay, City…"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCheckoutModal()">Cancel</button>
        <button class="btn-place" onclick="confirmOrder()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Place Order
        </button>
      </div>
    </div>
  `;

  document.getElementById('checkoutModalOverlay').classList.add('open');
}

function closeCheckoutModal() {
  document.getElementById('checkoutModalOverlay').classList.remove('open');
}

function confirmOrder() {
  const name    = document.getElementById('coName').value.trim();
  const phone   = document.getElementById('coPhone').value.trim();
  const address = document.getElementById('coAddress').value.trim();

  if (!name)    { shakeField('coName');    showToast('⚠️ Isulod ang imong ngalan'); return; }
  if (!phone)   { shakeField('coPhone');   showToast('⚠️ Isulod ang imong number'); return; }
  if (!address) { shakeField('coAddress'); showToast('⚠️ Isulod ang delivery address'); return; }

  const total = Object.values(cartItems).reduce((s, i) => s + i.price * i.qty, 0);
  const items = Object.entries(cartItems).map(([name, {price, qty}]) => ({ name, price, qty }));

  fetch('/place_order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, phone, address, items, total })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success || data.message === 'order_placed') {
      showSuccess(name, phone, address, total);
      for (let k in cartItems) delete cartItems[k];
      updateDrawer();
    } else {
      showToast('❌ ' + (data.error || 'Failed to place order'));
    }
  })
  .catch(() => showToast('❌ Server error'));
}

function showSuccess(name, phone, address, total) {
  const box = document.getElementById('checkoutModalBox');
  box.innerHTML = `
    <div class="success-wrap">
      <div class="success-icon">✅</div>
      <div class="success-title">Order Placed!</div>
      <p class="success-sub">Salamat, <strong>${name}</strong>!<br>Ang imong order gidawat na ug giandam na.</p>
      <div class="success-card">
        <div><strong>Name:</strong> ${name}</div>
        <div><strong>Contact:</strong> ${phone}</div>
        <div><strong>Deliver to:</strong> ${address}</div>
        <div><strong>Total:</strong> ₱${total.toFixed(2)}</div>
        <div><strong>Payment:</strong> Cash on Delivery</div>
      </div>
      <button class="checkout-btn" onclick="closeCheckoutModal()">Done</button>
    </div>
  `;
}

function shakeField(id) {
  const el = document.getElementById(id);
  el.style.borderColor = '#c0392b';
  el.style.boxShadow = '0 0 0 3px rgba(192,57,43,0.15)';
  el.classList.add('shake');
  el.focus();
  setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; el.classList.remove('shake'); }, 1500);
}

document.getElementById('checkoutModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeCheckoutModal();
});

// Load cart from session on page refresh
document.addEventListener('DOMContentLoaded', () => {
  fetch("/get_cart")
    .then(res => res.json())
    .then(data => {
      Object.assign(cartItems, data);
      updateDrawer();
    });
});
</script>

</body>
</html>
